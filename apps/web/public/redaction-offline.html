<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0c0c0f">
  <title>Indisponible — Wab Rédaction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(1.25rem, env(safe-area-inset-top)) 1.25rem max(1.25rem, env(safe-area-inset-bottom));
      color: #f4f4f5;
      background: linear-gradient(145deg, #0c0c0f 0%, #1d3557 52%, #8b1538 100%);
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: min(100%, 22rem);
      padding: 2rem 1.5rem;
      border-radius: 1.25rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }
    .logo {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1.25rem;
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }
    .brand {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      margin: 0 0 0.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
      margin: 0 0 0.75rem;
    }
    p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.78);
    }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 0.75rem;
      background: #c41e3a;
      color: #fff;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/icons/icon-192.png" width="64" height="64" alt="">
    <p class="brand">Wab Rédaction</p>
    <h1>Espace rédaction indisponible</h1>
    <p>Le serveur ne répond pas pour le moment. Réessayez dans quelques instants.</p>
    <button type="button" onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
