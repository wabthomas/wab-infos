# Nginx — Wab-infos (à placer dans /etc/nginx/sites-available/)
# sudo ln -s /etc/nginx/sites-available/wab-infos.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

# Redirection HTTP → HTTPS (site principal)
server {
    listen 80;
    server_name wab-infos.com www.wab-infos.com;
    return 301 https://wab-infos.com$request_uri;
}

# Redirection HTTP → HTTPS (CMS)
server {
    listen 80;
    server_name cms.wab-infos.com;
    return 301 https://cms.wab-infos.com$request_uri;
}

# Frontend Next.js
server {
    listen 443 ssl http2;
    server_name wab-infos.com www.wab-infos.com;

    # Certificats Let's Encrypt (certbot) ou PlanetHoster
    ssl_certificate     /etc/letsencrypt/live/wab-infos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wab-infos.com/privkey.pem;

    # www → apex
    if ($host = www.wab-infos.com) {
        return 301 https://wab-infos.com$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# CMS Strapi (port 8090)
server {
    listen 443 ssl http2;
    server_name cms.wab-infos.com;

    ssl_certificate     /etc/letsencrypt/live/wab-infos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wab-infos.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
