# Nginx — Wab-infos (nouvelle plateforme)
# WordPress reste sur wab-infos.com (hébergement séparé)
# Nouvelle app : app.wab-infos.com | CMS : cms.app.wab-infos.com
#
# sudo cp deploy/nginx/wab-infos.conf /etc/nginx/sites-available/wab-infos-app.conf
# sudo ln -s /etc/nginx/sites-available/wab-infos-app.conf /etc/nginx/sites-enabled/
# sudo certbot --nginx -d app.wab-infos.com -d cms.app.wab-infos.com
# sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS (frontend)
server {
    listen 80;
    server_name app.wab-infos.com;
    return 301 https://app.wab-infos.com$request_uri;
}

# HTTP → HTTPS (CMS)
server {
    listen 80;
    server_name cms.app.wab-infos.com;
    return 301 https://cms.app.wab-infos.com$request_uri;
}

# HTTP → HTTPS (rédaction)
server {
    listen 80;
    server_name redaction.app.wab-infos.com;
    return 301 https://redaction.app.wab-infos.com$request_uri;
}

# Frontend Next.js
server {
    listen 443 ssl http2;
    server_name app.wab-infos.com;

    ssl_certificate     /etc/letsencrypt/live/app.wab-infos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.wab-infos.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# App rédaction (Next.js, port 3001)
server {
    listen 443 ssl http2;
    server_name redaction.app.wab-infos.com;

    ssl_certificate     /etc/letsencrypt/live/app.wab-infos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.wab-infos.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# CMS Strapi (port 8090)
server {
    listen 443 ssl http2;
    server_name cms.app.wab-infos.com;

    ssl_certificate     /etc/letsencrypt/live/app.wab-infos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.wab-infos.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
