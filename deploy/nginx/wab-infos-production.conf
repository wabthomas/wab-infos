# Nginx — Production après bascule domaine
# wab-infos.com      → Next.js (port 3000)
# app.wab-infos.com  → WordPress (Apache/cPanel sur port 8080 ou socket — adapter)
# cms.app.wab-infos.com → Strapi (port 8090)
#
# WordPress : si servi par Apache/cPanel sur le même serveur, laisser app.wab-infos.com
# géré par le panneau d'hébergement OU proxy_pass vers Apache (ex. 127.0.0.1:8080).

# --- HTTP → HTTPS ---
server {
    listen 80;
    server_name wab-infos.com www.wab-infos.com app.wab-infos.com cms.app.wab-infos.com;
    return 301 https://$host$request_uri;
}

# www → apex
server {
    listen 443 ssl http2;
    server_name www.wab-infos.com;
    ssl_certificate     /etc/letsencrypt/live/wab-infos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wab-infos.com/privkey.pem;
    return 301 https://wab-infos.com$request_uri;
}

# --- Domaine principal : Next.js ---
server {
    listen 443 ssl http2;
    server_name wab-infos.com;

    ssl_certificate     /etc/letsencrypt/live/wab-infos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wab-infos.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

